<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Light Show Editor</title>

    <!-- Trunk builds the Rust crate (Bevy app) to wasm and injects the loader.
         data-wasm-opt="0" keeps dev rebuilds fast; release builds optimize. -->
    <link data-trunk rel="rust" data-wasm-opt="0" />
    <!-- Copy the Blender glTF scene (and any assets) into the served site. -->
    <link data-trunk rel="copy-dir" href="assets" />
    <base data-trunk-public-url />

    <style>
        html, body { overflow: hidden; margin: 0; padding: 0; height: 100%; width: 100%; background: #0e0e12; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>

    <script>
        // Bevy/winit calls preventDefault() on key events, which swallows Ctrl+R.
        // Capture-phase listener runs first so the browser reload still happens.
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'r' || e.key === 'R')) {
                window.location.reload();
            }
        }, true);
    </script>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
</body>
</html>
